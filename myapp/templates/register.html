{% extends 'base.html' %}
{% load static %}
{% block base %}

<!--breadcrumb area start-->
<div class="breadcrumb_container ">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <nav>
                    <ul>
                        <li>
                            <a href="{% url 'index' %}">Home ></a>
                        </li>
                        <li>Register</li>

                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<!--breadcrumb area end-->

<!--login section start-->


</style>

<div class="page_login_section">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <div class="register_page_form">
                    <form name="myForm" method="POST" onsubmit="return validateForm()">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-lg-6 col-sm-6 col-md-6">
                                <div class="input_text">
                                    <label for="R_N">First Name <span>*</span></label>
                                    <input id="R_N" type="text" name='fname' required minlength="2">
                                </div>
                            </div>
                            <div class="col-lg-6 col-sm-6 col-md-6">
                                <div class="input_text">
                                    <label for="R_N2">Last Name <span>*</span></label>
                                    <input id="R_N2" type="text" name='lname' required minlength="2">
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <div class="input_text">
                                    <label for="R_N4">Email Address <span>*</span></label>
                                    <input id="R_N4" type="email" name='email' required>
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <div class="input_text">
                                    <label for="R_N5">Phone Number <span>*</span></label>
                                    <input id="R_N5" type="tel" name='phone' required pattern="[0-9]{10,15}">
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="input_text">
                                    <label for="R_N11">Account password<span>*</span></label>
                                    <input id="R_N11" type="password" name='pass1' required
                                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="input_text">
                                    <label for="R_N12">Confirm password<span>*</span></label>
                                    <input id="R_N12" type="password" name='pass2' required>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="login_submit">
                                    <input value="register" type="submit">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    function validateForm() {
        var pass1 = document.forms["myForm"]["pass1"].value;
        var pass2 = document.forms["myForm"]["pass2"].value;

        if (pass1 !== pass2) {
            alert("Passwords do not match!");
            return false;
        }
        return true;
    }
</script>


{% endblock %}
