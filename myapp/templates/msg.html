{% if messages %}
<div style="position: fixed; top: 80px; right: 20px; z-index: 9999; max-width: 400px;">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" 
         role="alert" 
         style="margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out;">
      <strong>
        {% if message.tags == 'success' %}
          ✅ Success:
        {% elif message.tags == 'error' or message.tags == 'danger' %}
          ❌ Error:
        {% elif message.tags == 'warning' %}
          ⚠️ Warning:
        {% else %}
          ℹ️ Info:
        {% endif %}
      </strong>
      {{ message }}
      <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer;">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
  {% endfor %}
</div>

<script>
  // Auto-hide messages after 5 seconds
  setTimeout(function() {
    var alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert) {
      alert.style.transition = 'opacity 0.5s';
      alert.style.opacity = '0';
      setTimeout(function() {
        alert.remove();
      }, 500);
    });
  }, 5000);

  // Close button functionality
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('close') || e.target.parentElement.classList.contains('close')) {
      var alert = e.target.closest('.alert');
      if (alert) {
        alert.style.transition = 'opacity 0.5s';
        alert.style.opacity = '0';
        setTimeout(function() {
          alert.remove();
        }, 500);
      }
    }
  });
</script>

<style>
  @keyframes slideIn {
    from {
      transform: translateX(400px);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }
  
  .alert {
    border-radius: 8px;
    padding: 15px 40px 15px 15px;
    font-size: 14px;
    position: relative;
  }
  
  .alert-success {
    background-color: #d4edda;
    border-color: #c3e6cb;
    color: #155724;
  }
  
  .alert-danger, .alert-error {
    background-color: #f8d7da;
    border-color: #f5c6cb;
    color: #721c24;
  }
  
  .alert-warning {
    background-color: #fff3cd;
    border-color: #ffeaa7;
    color: #856404;
  }
  
  .alert-info {
    background-color: #d1ecf1;
    border-color: #bee5eb;
    color: #0c5460;
  }
</style>
{% endif %}
