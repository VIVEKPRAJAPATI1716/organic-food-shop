{% extends 'base.html' %}
{% load static %}
{% block base %}

<!--breadcrumb area start-->
<div class="breadcrumb_container">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <nav>
                    <ul>
                        <li><a href="{% url 'index' %}">Home</a> ></li>
                        <li>Reset Password</li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<!--breadcrumb area end-->

<!--login section start-->
<div class="page_login_section">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-md-8 offset-md-2 col-sm-10 offset-sm-1">
                <div class="login_page_form">
                    <form method="POST" id="resetForm" onsubmit="return validateResetForm()">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-12">
                                <div class="input_text">
                                    <label for="pass1">New Password <span>*</span></label>
                                    <input id="pass1" type="password" name='pass1' required 
                                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="input_text">
                                    <label for="pass2">Confirm New Password <span>*</span></label>
                                    <input id="pass2" type="password" name='pass2' required>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="login_submit">
                                    <input class="inline" value="Reset Password" type="submit">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    function validateResetForm() {
        var pass1 = document.getElementById("pass1").value;
        var pass2 = document.getElementById("pass2").value;

        if (pass1 !== pass2) {
            alert("Passwords do not match!");
            return false;
        }
        return true;
    }
</script>
{% endblock %}
